services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ip-call-app
        container_name: ip-call-app
        restart: unless-stopped
        working_dir: /var/www
        ports:
            - "80:80"
        environment:
            APP_NAME: "IP Call"
            APP_ENV: local
            APP_KEY: base64:ONDJfuw1P0U/yUDqhVgQhoechlrIUXuS7tFQOu7y/Y8=
            APP_DEBUG: "true"
            APP_URL: http://localhost/ip-call
            LOG_CHANNEL: stack
            LOG_LEVEL: debug
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ip_call
            DB_USERNAME: root
            DB_PASSWORD: root
            BROADCAST_DRIVER: log
            CACHE_DRIVER: file
            FILESYSTEM_DISK: local
            QUEUE_CONNECTION: sync
            SESSION_DRIVER: file
            SESSION_LIFETIME: 120
            OXIMONITOR_CAN_ACCESS_ADMIN: 0
        volumes:
            - ./:/var/www
            - vendor_data:/var/www/vendor
        networks:
            - ip-call-network
        depends_on:
            db:
                condition: service_healthy

    db:
        image: mysql:8.0
        container_name: ip-call-db
        restart: unless-stopped
        ports:
            - "3307:3306"
        environment:
            MYSQL_DATABASE: ip_call
            MYSQL_ROOT_PASSWORD: root
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - ip-call-network

    pma:
        image: phpmyadmin/phpmyadmin
        container_name: ip-call-pma
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
        ports:
            - "8080:80"
        networks:
            - ip-call-network
        depends_on:
            db:
                condition: service_healthy

networks:
    ip-call-network:
        driver: bridge

volumes:
    vendor_data:
