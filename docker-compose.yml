version: '3.7'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ip-call-app
        container_name: ip-call-app
        restart: unless-stopped
        working_dir: /var/www
        ports:
            - "80:80"
        environment:
            APP_NAME: "IP Call"
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost/ip-call
            LOG_CHANNEL: stack
            LOG_LEVEL: debug
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_DATABASE: ip_call
            DB_USERNAME: root
            DB_PASSWORD: root
            BROADCAST_DRIVER: log
            CACHE_DRIVER: file
            FILESYSTEM_DISK: local
            QUEUE_CONNECTION: sync
            SESSION_DRIVER: file
            SESSION_LIFETIME: 120
            OXIMONITOR_CAN_ACCESS_ADMIN: 1
        volumes:
            - ./:/var/www
            - /var/www/vendor
            - asterisk_config:/etc/asterisk
        networks:
            - ip-call-network
        depends_on:
            - db

    db:
        image: mysql:8.0
        container_name: ip-call-db
        restart: unless-stopped
        ports:
            - "3306:3306"
        environment:
            MYSQL_DATABASE: ip_call
            MYSQL_ROOT_PASSWORD: root
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - ip-call-network

    pma:
        image: phpmyadmin/phpmyadmin
        container_name: ip-call-pma
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
        ports:
            - "8080:80"
        networks:
            - ip-call-network
        depends_on:
            - db

    asterisk:
        image: andrius/asterisk:latest
        container_name: ip-call-asterisk
        restart: unless-stopped
        network_mode: "host"
        volumes:
            - asterisk_config:/etc/asterisk
            - ./public/records:/var/www/html/records
        entrypoint: >
            sh -c "
            mkdir -p /etc/asterisk &&
            echo '[general]' > /etc/asterisk/http.conf &&
            echo 'enabled=yes' >> /etc/asterisk/http.conf &&
            echo 'bindaddr=0.0.0.0' >> /etc/asterisk/http.conf &&
            echo 'bindport=8088' >> /etc/asterisk/http.conf &&
            exec asterisk -f
            "

    mosquitto:
        image: eclipse-mosquitto:latest
        container_name: ip-call-mqtt
        restart: unless-stopped
        ports:
            - "1883:1883"
            - "9001:9001"
        volumes:
            - ./docker/mosquitto/data:/mosquitto/data
            - ./docker/mosquitto/log:/mosquitto/log
        entrypoint: >
            sh -c "
            mkdir -p /mosquitto/config &&
            echo 'listener 1883' > /mosquitto/config/mosquitto.conf &&
            echo 'listener 9001' >> /mosquitto/config/mosquitto.conf &&
            echo 'protocol websockets' >> /mosquitto/config/mosquitto.conf &&
            echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf &&
            chown -R mosquitto:mosquitto /mosquitto/config &&
            exec /docker-entrypoint.sh mosquitto -c /mosquitto/config/mosquitto.conf
            "
        networks:
            - ip-call-network

networks:
    ip-call-network:
        driver: bridge

volumes:
    asterisk_config:
