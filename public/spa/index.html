    <link rel="stylesheet" crossorigin href="/assets/index-DJn0mMSu.css">
  </head>
  <body>
    <div id="root"></div>
    <script>

      document.addEventListener('mousewheel', e => { // Preventing the pinch-to-zoom
        if (e.ctrlKey){
          e.preventDefault()
        }
      }, {passive: false})

      document.addEventListener("keydown", function (event) {
        if ((event.ctrlKey || event.metaKey) && (event.key === '+' || event.key === '-' || event.key === '=')) {
          event.preventDefault();
        }
      });

    </script>
  </body>
</html>
