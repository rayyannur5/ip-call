version: '3.8'

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        image: ip-call-app
        container_name: ip-call-app
        restart: unless-stopped
        working_dir: /var/www
        volumes:
            - ./:/var/www
            - ../playlist:/var/playlist
            - ../liquidsoap:/var/liquidsoap
        networks:
            - ip-call-network
        depends_on:
            - db

    # Web Server (Nginx)
    web:
        image: nginx:alpine
        container_name: ip-call-web
        restart: unless-stopped
        ports:
            - "80:80"
        volumes:
            - ./:/var/www
            - ./docker/nginx/conf.d:/etc/nginx/conf.d
        networks:
            - ip-call-network
        depends_on:
            - app

    db:
        image: mysql:8.0
        container_name: ip-call-db
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: ${DB_DATABASE}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
            SERVICE_TAGS: dev
            SERVICE_NAME: mysql
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
            - ./docker/mysql/init:/docker-entrypoint-initdb.d
        networks:
            - ip-call-network

    pma:
        image: phpmyadmin/phpmyadmin
        container_name: ip-call-pma
        restart: unless-stopped
        environment:
            PMA_HOST: db
            PMA_PORT: 3306
            PMA_ARBITRARY: 1
            PMA_USER: ${DB_USERNAME}
            PMA_PASSWORD: ${DB_PASSWORD}
        ports:
            - "8080:80"
        networks:
            - ip-call-network
        depends_on:
            - db

networks:
    ip-call-network:
        driver: bridge
